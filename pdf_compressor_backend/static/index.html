<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Compressor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a3e;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --accent3: #6affda;
      --text: #e8e8f0;
      --muted: #6a6a8a;
      --success: #4fffb0;
      --error: #ff5a7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,106,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 30px rgba(124,106,255,0.4);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      background: var(--surface);
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(124,106,255,0.06);
      box-shadow: 0 0 40px rgba(124,106,255,0.1) inset;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(124,106,255,0.5));
      transition: transform 0.3s ease;
    }

    .drop-zone:hover .drop-icon { transform: translateY(-4px); }

    .drop-label {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .drop-sub {
      color: var(--muted);
      font-size: 12px;
    }

    /* File preview */
    .file-preview {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 16px;
    }

    .file-preview.visible { display: flex; }

    .file-preview .file-icon { font-size: 24px; }
    .file-preview .file-info { flex: 1; min-width: 0; }
    .file-preview .file-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-preview .file-size { font-size: 11px; color: var(--muted); }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s;
    }
    .remove-btn:hover { color: var(--error); }

    /* Quality selector */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 12px;
    }

    .quality-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .quality-option input { display: none; }

    .quality-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
    }

    .quality-option input:checked + .quality-card {
      border-color: var(--accent);
      background: rgba(124,106,255,0.1);
      box-shadow: 0 0 20px rgba(124,106,255,0.15);
    }

    .quality-card:hover { border-color: var(--accent); }

    .q-emoji { font-size: 22px; display: block; margin-bottom: 6px; }
    .q-name {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
    }
    .q-desc { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* Compress button */
    .compress-btn {
      width: 100%;
      padding: 16px;
      margin-top: 24px;
      background: linear-gradient(135deg, var(--accent), #9b6aff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .compress-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .compress-btn:hover::before { opacity: 1; }
    .compress-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(124,106,255,0.4); }
    .compress-btn:active { transform: translateY(0); }
    .compress-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Progress */
    .progress-wrap {
      display: none;
      margin-top: 20px;
    }
    .progress-wrap.visible { display: block; }

    .progress-bar-bg {
      background: var(--surface);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(124,106,255,0.5);
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    /* Results */
    .results {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }

    .results.visible { display: block; animation: slideUp 0.4s ease; }
    .results::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--success), transparent);
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-box {
      text-align: center;
      padding: 12px 8px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
    }

    .stat-val.accent { color: var(--accent3); }
    .stat-val.reduction {
      color: var(--success);
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Visual size bar */
    .size-bar-wrap { margin-bottom: 16px; }
    .size-bar-lbl {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .size-bar-track {
      background: var(--card);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
      position: relative;
    }

    .size-bar-original {
      position: absolute;
      inset: 0;
      background: rgba(124,106,255,0.25);
      border-radius: 999px;
    }

    .size-bar-compressed {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--success), var(--accent3));
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 10px rgba(79,255,176,0.4);
    }

    .download-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--success), #30c98a);
      border: none;
      border-radius: 10px;
      color: #0a1a12;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.04em;
    }

    .download-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(79,255,176,0.3);
    }

    /* Error */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(255,90,122,0.1);
      border: 1px solid rgba(255,90,122,0.3);
      border-radius: 10px;
      color: var(--error);
      font-size: 13px;
    }
    .error-box.visible { display: block; animation: slideUp 0.3s ease; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo-row">
        <div class="logo-icon">📄</div>
        <h1>PDF Crush</h1>
      </div>
      <p class="tagline">Compress · Shrink · Deliver</p>
    </header>

    <div class="card">
      <!-- Drop Zone -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf" />
        <span class="drop-icon">🗜️</span>
        <div class="drop-label">Drop your PDF here</div>
        <div class="drop-sub">or click to browse · max 50MB</div>
      </div>

      <!-- File preview -->
      <div class="file-preview" id="filePreview">
        <span class="file-icon">📋</span>
        <div class="file-info">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="remove-btn" id="removeBtn" title="Remove file">✕</button>
      </div>

      <!-- Quality -->
      <div class="section-label">Compression level</div>
      <div class="quality-grid">
        <label class="quality-option">
          <input type="radio" name="quality" value="high" />
          <div class="quality-card">
            <span class="q-emoji">🪶</span>
            <div class="q-name">Light</div>
            <div class="q-desc">Best quality</div>
          </div>
        </label>
        <label class="quality-option">
          <input type="radio" name="quality" value="medium" checked />
          <div class="quality-card">
            <span class="q-emoji">⚖️</span>
            <div class="q-name">Balanced</div>
            <div class="q-desc">Recommended</div>
          </div>
        </label>
        <label class="quality-option">
          <input type="radio" name="quality" value="low" />
          <div class="quality-card">
            <span class="q-emoji">🔬</span>
            <div class="q-name">Maximum</div>
            <div class="q-desc">Smallest file</div>
          </div>
        </label>
      </div>

      <!-- Button -->
      <button class="compress-btn" id="compressBtn" disabled>
        Compress PDF
      </button>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel">Uploading...</div>
      </div>

      <!-- Error -->
      <div class="error-box" id="errorBox"></div>

      <!-- Results -->
      <div class="results" id="results">
        <div class="results-title">✦ Compression complete</div>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-val" id="statOriginal">—</div>
            <div class="stat-lbl">Original</div>
          </div>
          <div class="stat-box">
            <div class="stat-val accent" id="statCompressed">—</div>
            <div class="stat-lbl">Compressed</div>
          </div>
          <div class="stat-box">
            <div class="stat-val reduction" id="statReduction">—</div>
            <div class="stat-lbl">Saved</div>
          </div>
        </div>
        <div class="size-bar-wrap">
          <div class="size-bar-lbl">
            <span>Original</span><span>Compressed</span>
          </div>
          <div class="size-bar-track">
            <div class="size-bar-original"></div>
            <div class="size-bar-compressed" id="sizeBarCompressed" style="width:0%"></div>
          </div>
        </div>
        <button class="download-btn" id="downloadBtn">⬇ Download Compressed PDF</button>
      </div>
    </div>

    <footer>PDF Crush — runs locally · files auto-deleted after 5 min</footer>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeBtn');
    const compressBtn = document.getElementById('compressBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const errorBox = document.getElementById('errorBox');
    const results = document.getElementById('results');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;
    let currentFileId = null;

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function setFile(file) {
      if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
        showError('Please select a valid PDF file.');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      filePreview.classList.add('visible');
      compressBtn.disabled = false;
      hideResults();
      hideError();
    }

    fileInput.addEventListener('change', e => setFile(e.target.files[0]));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) { fileInput.files = e.dataTransfer.files; setFile(file); }
    });

    removeBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      filePreview.classList.remove('visible');
      compressBtn.disabled = true;
      hideResults();
      hideError();
    });

    function showError(msg) {
      errorBox.textContent = '⚠ ' + msg;
      errorBox.classList.add('visible');
    }
    function hideError() { errorBox.classList.remove('visible'); }
    function hideResults() {
      results.classList.remove('visible');
      currentFileId = null;
    }

    function animateProgress(target, label) {
      progressFill.style.width = target + '%';
      progressLabel.textContent = label;
    }

    compressBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      const quality = document.querySelector('input[name="quality"]:checked').value;

      // Reset UI
      hideError();
      hideResults();
      compressBtn.disabled = true;
      compressBtn.innerHTML = '<span class="spinner"></span>Compressing...';
      progressWrap.classList.add('visible');
      animateProgress(10, 'Uploading file...');

      const formData = new FormData();
      formData.append('pdf', selectedFile);
      formData.append('quality', quality);

      try {
        // Fake progress for UX
        setTimeout(() => animateProgress(35, 'Analyzing PDF structure...'), 400);
        setTimeout(() => animateProgress(60, 'Compressing streams...'), 900);
        setTimeout(() => animateProgress(85, 'Optimizing objects...'), 1400);

        const response = await fetch('/compress', { method: 'POST', body: formData });
        const data = await response.json();

        animateProgress(100, 'Done!');
        await new Promise(r => setTimeout(r, 400));

        if (!response.ok || !data.success) {
          throw new Error(data.error || 'Compression failed');
        }

        // Show results
        currentFileId = data.file_id;
        document.getElementById('statOriginal').textContent = formatSize(data.original_size);
        document.getElementById('statCompressed').textContent = formatSize(data.compressed_size);

        const red = data.reduction;
        document.getElementById('statReduction').textContent = (red > 0 ? '-' : '+') + Math.abs(red) + '%';

        // Size bar animation
        const ratio = Math.max(5, Math.min(95, (data.compressed_size / data.original_size) * 100));
        setTimeout(() => {
          document.getElementById('sizeBarCompressed').style.width = ratio + '%';
        }, 200);

        progressWrap.classList.remove('visible');
        results.classList.add('visible');

      } catch (err) {
        progressWrap.classList.remove('visible');
        showError(err.message);
      } finally {
        compressBtn.disabled = false;
        compressBtn.innerHTML = 'Compress PDF';
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!currentFileId) return;
      const a = document.createElement('a');
      a.href = `/download/${currentFileId}`;
      a.download = 'compressed.pdf';
      a.click();
    });
  </script>
</body>
</html>
