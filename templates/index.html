<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection - PAN/Income Recognition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .nav-links {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #764ba2;
        }

        .nav-links a.active {
            text-decoration: underline;
            color: #764ba2;
        }

        .device-status {
            display: inline-block;
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .device-status.gpu {
            background: #d4edda;
            color: #155724;
        }

        .device-status.cpu {
            background: #fff3cd;
            color: #856404;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f0f0;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e0f7;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            color: #333;
            font-weight: 600;
            min-width: 100px;
        }

        input[type="range"] {
            width: 150px;
            cursor: pointer;
        }

        .conf-value {
            color: #667eea;
            font-weight: bold;
            min-width: 40px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .results-section.show {
            display: block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .image-box {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-label {
            padding: 10px;
            background: #f5f5f5;
            text-align: center;
            font-weight: 600;
            color: #666;
        }

        .detections-box {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .detections-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .detection-count {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .detection-item {
            background: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detection-class {
            font-weight: 600;
            color: #333;
            flex-grow: 1;
        }

        .detection-conf {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f5c6cb;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c3e6cb;
            display: none;
        }

        .clear-btn {
            background: #999;
            margin-top: 20px;
        }

        .clear-btn:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Object Detection</h1>
            <p class="subtitle">PAN & Income Document Recognition</p>
            <div class="nav-links">
                <a href="/" class="active">📤 Upload Image</a>
                <a href="/realtime">📹 Live Camera</a>
            </div>
            <div class="device-status" id="deviceStatus"></div>
        </header>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div class="upload-section">
            <div class="controls">
                <div class="control-group">
                    <label for="confSlider">Confidence Threshold:</label>
                    <input type="range" id="confSlider" min="0" max="1" step="0.1" value="0.5">
                    <span class="conf-value" id="confValue">0.5</span>
                </div>
                <div class="control-group">
                    <label for="modelSelect">Detection Model:</label>
                    <select id="modelSelect" style="padding: 8px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer;">
                        <option value="ultralytics">Ultralytics (Cloud)</option>
                        <option value="openvino">OpenVINO (Local)</option>
                    </select>
                </div>
                <button id="clearBtn" class="clear-btn" style="display:none;">Clear Results</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-subtext">PNG, JPG, JPEG (Max 50MB)</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>
        </div>

        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-grid">
                <div>
                    <div class="image-box">
                        <img id="resultImage" alt="Detection Result">
                        <div class="image-label">Detection Result</div>
                    </div>
                </div>
                <div>
                    <div class="detections-box">
                        <div class="detections-title">🔍 Detections</div>
                        <div class="detection-count" id="detectionCount">0</div>
                        <div id="detectionsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const confSlider = document.getElementById('confSlider');
        const confValue = document.getElementById('confValue');
        const modelSelect = document.getElementById('modelSelect');
        const resultsSection = document.getElementById('resultsSection');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const deviceStatus = document.getElementById('deviceStatus');
        const clearBtn = document.getElementById('clearBtn');

        // Update confidence value display
        confSlider.addEventListener('input', (e) => {
            confValue.textContent = e.target.value;
        });

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Handle file upload
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('conf', confSlider.value);
            formData.append('model', modelSelect.value);

            loadingIndicator.style.display = 'block';
            errorMsg.style.display = 'none';
            resultsSection.classList.remove('show');

            fetch('/api/detect', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loadingIndicator.style.display = 'none';
                if (data.success) {
                    displayResults(data);
                    clearBtn.style.display = 'inline-block';
                    showSuccess(`Found ${data.count} object(s) using ${data.model} model`);
                } else {
                    showError(data.error || 'Detection failed');
                }
            })
            .catch(error => {
                loadingIndicator.style.display = 'none';
                showError('Error: ' + error.message);
            });
        }

        // Display results
        function displayResults(data) {
            document.getElementById('resultImage').src = data.image;
            document.getElementById('detectionCount').textContent = data.count;

            const detectionsList = document.getElementById('detectionsList');
            detectionsList.innerHTML = '';

            data.detections.forEach(det => {
                const item = document.createElement('div');
                item.className = 'detection-item';
                item.innerHTML = `
                    <span class="detection-class">${det.class}</span>
                    <span class="detection-conf">${(det.confidence * 100).toFixed(0)}%</span>
                `;
                detectionsList.appendChild(item);
            });

            resultsSection.classList.add('show');
        }

        // Show error
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        // Show success
        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        // Clear results
        clearBtn.addEventListener('click', () => {
            resultsSection.classList.remove('show');
            fileInput.value = '';
            clearBtn.style.display = 'none';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        });

        // Check device status on load
        window.addEventListener('load', () => {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('deviceStatus');
                    const models = data.available_models || ['ultralytics'];
                    
                    // Update model selector based on availability
                    const openvinoOption = modelSelect.querySelector('option[value="openvino"]');
                    if (!data.openvino_available && openvinoOption) {
                        openvinoOption.disabled = true;
                        openvinoOption.textContent = 'OpenVINO (Not Available)';
                    }
                    
                    statusDiv.textContent = `Ready | Models: ${models.join(', ')}`;
                    statusDiv.style.display = 'inline-block';
                });
        });
    </script>
</body>
</html>
